<h1>APARTMENT FEATURES</h1> 
      <p>These provides a variety of images of the apartment that you can choose from at an affodable price.</p>
      
   
  <main class="container-fluid px-0">
   <div class="row">
  <div class="col-12">
    <div class="image-container">
      <div class="image-grid">

        <div class="image-row">
          <img src="images/kitchen1.jpg" onclick="openLightbox(0)">
        </div>

        <div class="image-row">
          <img src="images/2bed.jpg" onclick="openLightbox(1)">
        </div>

        <div class="image-row">
          <img src="images/kitchen2.jpg" onclick="openLightbox(2)">
        </div>

        <div class="image-row">
          <img src="images/bath1.jpg" onclick="openLightbox(3)">
        </div>

        <div class="image-row">
          <img src="images/sittingroom3.jpg" onclick="openLightbox(4)">
        </div>

        <div class="image-row">
          <img src="images/bluebeds.jpg" onclick="openLightbox(5)">
        </div>

      </div>
    </div>
  </div>
</div>


    
<div class="gallery">
    <img src="images/kitchen1.jpg" onclick="openLightbox(0)">
   
</div>
     <div class="gallery">
      <img src="images/2bed.jpg" alt="bath1" width="600" height="400" onclick="openLightbox(0)">
    </div>

<div id="lightbox" class="lightbox">
    <span class="close" onclick="closeLightbox()">&times;</span>
    <span class="prev" onclick="changeImage(-1)">❮</span>
    <img id="lightboxImage">
  <p id="caption"></p>
    <span class="next" onclick="changeImage(1)">❯</span>

   <button class="back-btn" onclick="closeLightbox()">
        Back to Apartment Page
    </button>
</div>

<script>
let images = [
    
     "images/kitchen1.jpg", title: "Kitchen",
   "images/bluebed.jpg", title: "Bedroom",
     "images/bath1.jpg", title: "Bathroom",
     "images/kidbed.jpg", title: "Living Room"

];

let currentIndex = 0;

function openLightbox(index) {
    currentIndex = index;
    document.getElementById("lightbox").style.display = "flex";
    document.getElementById("lightboxImage").src = images[currentIndex];
}

  
function showImage() {
    document.getElementById("lightboxImage").src = images[currentIndex].src;
    document.getElementById("caption").innerText = images[currentIndex].title;
}


function closeLightbox() {
    document.getElementById("lightbox").style.display = "none";
}

function changeImage(step) {
    currentIndex += step;

    if (currentIndex < 0) {
        currentIndex = images.length - 1;
    }

    if (currentIndex >= images.length) {
        currentIndex = 0;
    }

    document.getElementById("lightboxImage").src = images[currentIndex];
}
</script>
